<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TBSC — FRP Boat Quotation System</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="styles.css">


</head>

<body>
<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">
        <svg width="24" height="24" viewBox="0 0 26 26"><path d="M3 17c2 3 5 3 7 1 2 2 5 2 7 0 2 2 5 2 7-1" stroke="#0d9488" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M6 14l2-9h9l2 9" stroke="#c9d1de" stroke-width="1.6" fill="none" stroke-linejoin="round"/><line x1="13" y1="5" x2="13" y2="2" stroke="#d97a06" stroke-width="1.6"/></svg>
        <h1>TBSC</h1>
      </div>
      <div class="sub">FRP Quotation System</div>
    </div>
    <nav class="nav" id="navList"></nav>
    <div class="sidebar-foot" id="sidebarFoot">Demo Build · Browser Storage Only</div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="main">
    <div class="topbar">
      <div class="title">
        <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span id="topbarTitle">Dashboard</span>
      </div>
      <div class="actions" id="topbarActions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="toast"></div>
<div id="loginScreen" style="position:fixed;inset:0;background:#f7f8fa;display:none;align-items:center;justify-content:center;z-index:1000;font-family:'Inter',sans-serif;">
  <form id="loginForm" style="width:320px;background:#fff;border:1px solid var(--border,#e6e8ec);border-radius:var(--radius,11px);padding:32px 28px;box-shadow:0 1px 2px rgba(15,23,42,.04), 0 24px 48px -24px rgba(15,23,42,.16);">
    <h1 style="font-family:'Sora',sans-serif;font-size:17px;font-weight:700;color:var(--ink);margin:0 0 4px;">TBSC Quotation System</h1>
    <div style="font-size:12px;color:var(--ink-soft);margin-bottom:20px;">Sign in with your team account to continue.</div>
    <div class="field"><label>Email</label><input type="email" id="loginEmail" autocomplete="username" required></div>
    <div class="field"><label>Password</label><input type="password" id="loginPassword" autocomplete="current-password" required></div>
    <div id="loginError" style="display:none;color:#b42318;font-size:12px;margin-bottom:12px;"></div>
    <button type="submit" class="btn btn-primary" id="loginSubmit" style="width:100%;justify-content:center;">Sign In</button>
  </form>
</div>
<div id="bootScreen" style="position:fixed;inset:0;background:#f7f8fa;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;font-family:'Inter',sans-serif;">
  <div style="width:34px;height:34px;border:3px solid #e7e9ee;border-top-color:#0d9488;border-radius:50%;animation:bootspin .8s linear infinite;"></div>
  <div style="color:#67707d;font-size:13px;">Loading quotation system…</div>
</div>

<script src="app.js"></script>


</body>
</html>
